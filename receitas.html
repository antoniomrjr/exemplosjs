<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Receitas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- folha de estilo bootstrap -->
</head>

<body onload="preencheCatalogo()">

    <main class="container-fluid bg-warning min-vh-100 p-4">

        <h1 class="mb-4">Catálogo de Receitas</h1>

        <div id="pnlCatalogo" class="d-flex flex-wrap gap-3"></div>

    </main>

    <script>
        var receitas = [
            {
                titulo: "Arroz de Couve-Flor",
                imagem: "https://cdn.casaeculinaria.com/wp-content/uploads/2023/04/10155836/Arroz-de-couve-flor-500x375.webp",
                preparo: "Deixe a couve-flor picada. Adicione os ingredientes e refogue bem. Adicione sal, tampe a panela e deixe cozinhar",
                ingredientes: [
                    "Arroz",
                    "Couve-flor",
                    "Cebola Média",
                    "Azeite",                    
                ]
            },
            {
                titulo: "Bolo de café",
                imagem: "https://cafebrasilcolonial.com.br/wp-content/uploads/2025/04/bolo-de-cafe.png",
                preparo: "Bata o açúcar, as gemas e o café. Adicione farinha e chocolate e mexa bem. Bata as claras e junte à mistura",
                ingredientes: [
                    "Farinha de trigo",
                    "Açúcar",
                    "Café coado",
                    "Chocolate em pó",
                    "Ovos"
                ]
            },
            {
                titulo: "Coxinha de brigadeiro",
                imagem: "https://www.restodonte.com.br/recipePics/9900934.jpg?v24",
                preparo: "Junte o leite condensado, chocolate em pó e manteiga. Aqueça no fogo baixo. Envolva os morangos e passe no granulado",
                ingredientes: [
                    "Leite condensado",
                    "Chocolate em pó",
                    "Manteiga",
                    "Morango",
                    "Chocolate granulado"
                ]
            }
        ];

       function getListaIngredientes(receita) {
        var texto = "<ul>";

        texto += receita.ingredientes
            .map(function(ingrediente) {
                return "<li>" + ingrediente + "</li>";
            })
            .reduce(function(acumulador, item) {
                return acumulador + item;
            });

        texto += "</ul>";

        return texto;
    }

        function getCard(receita) {
        return `
            <div class="card m-2" style="width: 250px;">
                
                <img 
                    src="${receita.imagem}" 
                    class="card-img-top"
                    style="width: 250px; height: 200px; object-fit: cover;"
                >

                <div class="card-body">
                    <h5 class="card-title">${receita.titulo}</h5>

                    <div class="card-text">
                        ${getListaIngredientes(receita)}
                        <hr>
                        ${receita.preparo}
                    </div>
                </div>
            </div>
        `;
    }

        function preencheCatalogo() {
            var pnlCatalogo = document.getElementById("pnlCatalogo");

            var textoHTML = receitas
                .map(function(receita) {
                    return getCard(receita);
                })
                .reduce(function(acumulador, card) {
                    return acumulador + card;
                });

            pnlCatalogo.innerHTML = textoHTML;
        }
    </script>

</body>
</html>
