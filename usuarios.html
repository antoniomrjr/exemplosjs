<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Usuários de Teste via REST</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-warning">

    <div class="container-fluid p-3">

        <h1 class="display-2 fw-bold">Usuários de Teste via REST</h1>

        <p class="text-white fst-italic fs-4">
            Os usuários deste exemplo são fornecidos pela API de testes
            <a href="https://reqres.in/" target="_blank" class="text-white">reqres.in</a>
        </p>

        <div id="usuarios" class="container-fluid">

            <div class="row">
                <div
                    class="card col-3 p-2 m-3"
                    v-for="(user, index) in users"
                    :key="index"
                    style="width: 20rem;"
                >
                    <img class="card-img-top" :src="user.avatar">

                    <div class="card-body">
                        <h5 class="card-title">
                            {{user.first_name}} {{user.last_name}}
                        </h5>

                        <p class="card-text">
                            {{user.email}}
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@2"></script>

    <script>
        var app = new Vue({
            el: "#usuarios",

            data: function () {
                return {
                    users: []
                };
            },

            mounted: function () {
                this.loadUsers();
            },

            methods: {
                loadUsers: function () {
                    this.users = [
                        {
                            first_name: "George",
                            last_name: "Bluth",
                            email: "george.bluth@reqres.in",
                            avatar: "https://picsum.photos/id/1005/300/300"
                        },
                        {
                            first_name: "Janet",
                            last_name: "Weaver",
                            email: "janet.weaver@reqres.in",
                            avatar: "https://picsum.photos/id/1011/300/300"
                        },
                        {
                            first_name: "Emma",
                            last_name: "Wong",
                            email: "emma.wong@reqres.in",
                            avatar: "https://picsum.photos/id/1027/300/300"
                        }
                    ];
                }
            }
        });
    </script>

</body>
</html>
